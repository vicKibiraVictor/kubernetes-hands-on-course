# Tell the External Secrets Operator (ESO) where the real secret lives (Vault)
# and what Kubernetes Secret to create from it.

# WHERE: a Vault server, authenticated with a token kept in 'vault-token'.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: app
spec:
  provider:
    vault:
      server: "http://vault.vault:8200"
      path: "secret"          # the kv-v2 mount
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
---
# WHAT: pull secret/demo -> a Kubernetes Secret named 'app-secret'.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secret
  namespace: app
spec:
  refreshInterval: 15s        # re-sync if it changes in Vault
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: app-secret          # the Secret ESO will create
  data:
    - secretKey: password     # key in the new Kubernetes Secret
      remoteRef:
        key: demo             # path under secret/  (secret/demo)
        property: password    # which field
