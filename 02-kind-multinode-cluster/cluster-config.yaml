# The course cluster: 1 control-plane + 2 workers.
# The control-plane is labelled "ingress-ready" and maps ports 80/443 to your
# machine, so the Ingress controller we install in Chapter 4 is reachable at
# http://localhost.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: k8s-course
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
  - role: worker
  - role: worker
