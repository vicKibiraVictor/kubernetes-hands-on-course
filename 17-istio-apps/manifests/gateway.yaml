# Expose the Bookinfo app through Istio's ingress gateway.
# Gateway = the front door; VirtualService = the routing rules behind it.
apiVersion: networking.istio.io/v1
kind: Gateway
metadata:
  name: bookinfo-gw
  namespace: bookinfo
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts: ["*"]
---
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: bookinfo
  namespace: bookinfo
spec:
  hosts: ["*"]
  gateways: [bookinfo-gw]
  http:
    - match:
        - uri: { exact: /productpage }
        - uri: { prefix: /static }
        - uri: { exact: /login }
        - uri: { exact: /logout }
        - uri: { prefix: /api/v1/products }
      route:
        - destination:
            host: productpage
            port: { number: 9080 }
