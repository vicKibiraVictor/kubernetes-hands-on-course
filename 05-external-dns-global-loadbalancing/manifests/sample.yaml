# A service that asks external-dns to create a DNS name for it.
# The annotation is the magic: external-dns watches for it.
apiVersion: v1
kind: Namespace
metadata:
  name: ch5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shop
  namespace: ch5
spec:
  replicas: 1
  selector:
    matchLabels: { app: shop }
  template:
    metadata:
      labels: { app: shop }
    spec:
      containers:
        - name: shop
          image: nginx:alpine
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: shop
  namespace: ch5
  annotations:
    external-dns.alpha.kubernetes.io/hostname: shop.example.com
spec:
  type: LoadBalancer
  selector: { app: shop }
  ports:
    - port: 80
      targetPort: 80
