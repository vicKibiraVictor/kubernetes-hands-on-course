# A simple web app exposed three ways: ClusterIP (internal) and LoadBalancer.
apiVersion: v1
kind: Namespace
metadata:
  name: ch4
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ch4
spec:
  replicas: 2
  selector:
    matchLabels: { app: web }
  template:
    metadata:
      labels: { app: web }
    spec:
      containers:
        - name: web
          image: nginx:alpine
          ports:
            - containerPort: 80
---
# ClusterIP = a stable name reachable only INSIDE the cluster.
apiVersion: v1
kind: Service
metadata:
  name: web-clusterip
  namespace: ch4
spec:
  selector: { app: web }
  ports:
    - port: 80
      targetPort: 80
---
# LoadBalancer = an external IP. MetalLB hands one out from its pool.
apiVersion: v1
kind: Service
metadata:
  name: web-lb
  namespace: ch4
spec:
  type: LoadBalancer
  selector: { app: web }
  ports:
    - port: 80
      targetPort: 80
