apiVersion: v1
kind: Namespace
metadata:
  name: ch13
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: ch13
spec:
  replicas: 1
  selector:
    matchLabels: { app: web }
  template:
    metadata:
      labels: { app: web }
    spec:
      containers:
        - name: web
          image: nginx:alpine
